name: Dependency Updates

on:
  schedule:
    # Every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for outdated packages
        working-directory: ./ulrich-energy-auditing
        run: |
          npm ci
          echo "### 📦 Package Update Report" > ../update-report.md
          echo "" >> ../update-report.md
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> ../update-report.md
          echo "" >> ../update-report.md
          echo "#### Current Dependencies" >> ../update-report.md
          echo '```json' >> ../update-report.md
          cat package.json | jq '.dependencies' >> ../update-report.md
          echo '```' >> ../update-report.md
          echo "" >> ../update-report.md
          echo "#### Outdated Packages" >> ../update-report.md
          echo '```' >> ../update-report.md
          npm outdated || true >> ../update-report.md
          echo '```' >> ../update-report.md

      - name: Check for security vulnerabilities
        working-directory: ./ulrich-energy-auditing
        run: |
          echo "" >> ../update-report.md
          echo "#### Security Audit" >> ../update-report.md
          echo '```' >> ../update-report.md
          npm audit --audit-level moderate || true >> ../update-report.md
          echo '```' >> ../update-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: update-report.md

      - name: Create issue for major updates
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('update-report.md', 'utf8');
            
            const issueTitle = `📦 Weekly Dependency Update Check - ${new Date().toISOString().split('T')[0]}`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: report,
              labels: ['dependencies', 'maintenance']
            });

  update-dependencies:
    runs-on: ubuntu-latest
    needs: check-updates
    # Only run if explicitly triggered or on main branch
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update packages
        working-directory: ./ulrich-energy-auditing
        run: |
          npm ci
          npx npm-check-updates -u
          npm install

      - name: Run tests
        working-directory: ./ulrich-energy-auditing
        run: |
          npm run type-check
          npm run build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: 'chore: Automated dependency update'
          body: |
            ## 📦 Automated Dependency Update

            This PR updates project dependencies to their latest compatible versions.

            ### Changes Made
            - Updated packages using `npm-check-updates`
            - Verified build and type checking pass

            ### Checklist
            - [ ] Review changelogs for major updates
            - [ ] Test all critical functionality
            - [ ] Verify no breaking changes
            - [ ] Approve and merge when ready

            > ⚠️ **Note:** Automated PR created by GitHub Actions
          branch: chore/dependency-update
          delete-branch: true
