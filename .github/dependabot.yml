version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/ulrich-energy-auditing"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "shaun-ulrich"
    assignees:
      - "shaun-ulrich"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
